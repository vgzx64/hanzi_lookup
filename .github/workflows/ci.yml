name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown

    - name: Cache cargo dependencies
      uses: Swatinem/rust-cache@v2

    - name: Build (wasm32)
      run: cargo build -p hanzi_lookup --target wasm32-unknown-unknown --release

    - name: Run tests
      run: cargo test -p hanzi_lookup